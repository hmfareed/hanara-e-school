version: '3.9'

services:
  # ── MongoDB ──────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: hanara_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-hanara}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-hanaraSecret2026}
      MONGO_INITDB_DATABASE: hanara_sms
    volumes:
      - mongo_data:/data/db
    networks:
      - hanara_net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Backend API ───────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hanara_backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      # Connection string using the mongo service name as the host
      MONGODB_URI: mongodb://${MONGO_ROOT_USER:-hanara}:${MONGO_ROOT_PASSWORD:-hanaraSecret2026}@mongo:27017/hanara_sms?authSource=admin
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      CLIENT_ORIGIN: ${CLIENT_ORIGIN:-http://localhost}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@hanaraschools.edu.gh}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-Admin@2026}
    networks:
      - hanara_net
    # Backend is NOT exposed to the host; only the frontend nginx proxy can reach it
    expose:
      - "5000"

  # ── Frontend (React + Nginx) ──────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hanara_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    networks:
      - hanara_net

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  mongo_data:
    driver: local

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  hanara_net:
    driver: bridge
